<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Coverage Stack Excel</title><script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script><script defer="defer" src="taskpane.bundle.js"></script></head><body><div id="app" class="app-root"><div class="toolbar"><button id="btnUseRange" class="primary-btn">Use Selected Range</button> <button id="btnToggleMapping" class="secondary-btn">Column Mapping</button> <button id="btnRefresh" class="secondary-btn">Refresh</button> <label class="inline-field" id="accountFilterWrap">Account <select id="accountFilterSelect"></select></label> <label class="inline-field" id="yearFilterWrap">YoA <select id="yearFilterSelect"></select></label> <label class="inline-field">Color by <select id="paletteModeSelect"><option value="underwriter">Underwriter</option><option value="layer">Layer</option><option value="excess">Excess point</option></select></label> <label class="inline-field zoom-field">Zoom <input id="zoomScaleInput" type="range" min="25" max="100" step="5" value="100"/> <span id="zoomScaleValue">100%</span></label><div class="inline-field">Block Details<div id="blockDetailsOptions" class="details-options"></div></div><button id="btnToggleSummary" class="secondary-btn">Hide Summary</button> <button id="btnToggleLegend" class="secondary-btn">Hide Legend</button> <label class="inline-field">Width <select id="widthMetricSelect"><option value="signedLine">Signed line</option><option value="writtenLine">Written line</option><option value="signedLine2">Signed line 2</option><option value="custom">Custom column</option></select></label> <label class="inline-field" id="customMetricWrap">Custom <select id="customMetricSelect"></select></label> <label class="inline-field">Order % <input id="orderSizeInput" type="number" min="0.01" max="100" step="0.01" value="100"/></label> <button id="btnOptimize" class="primary-btn">Optimize Signed Li
